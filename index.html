<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>我的应用平台</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 登录页面 -->
        <div id="loginView" class="view login-view">
            <div class="login-box">
                <div class="login-logo">
                    <span class="icon">🚀</span>
                    <h1>我的应用平台</h1>
                    <p>个人软件和游戏中心</p>
                </div>
                <form class="login-form" id="loginForm">
                    <input type="text" id="usernameInput" placeholder="用户名" autocomplete="off">
                    <input type="password" id="passwordInput" placeholder="密码" autocomplete="off">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberCheckbox">
                        记住密码
                    </label>
                    <button type="button" id="loginBtn">登录</button>
                    <div class="login-error" id="loginError"></div>
                </form>
            </div>
        </div>

        <!-- 主页 -->
        <div id="homeView" class="view home-view">
            <header class="header">
                <div class="header-title">
                    <span>🚀</span>
                    <span>我的应用</span>
                </div>
                <div class="header-actions">
                    <button class="header-btn" id="favoritesBtn" title="收藏">⭐</button>
                </div>
            </header>
            
            <nav class="tabs">
                <button class="tab-btn active" data-tab="all">全部</button>
                <button class="tab-btn" data-tab="games">游戏</button>
                <button class="tab-btn" data-tab="apps">应用</button>
            </nav>
            
            <div class="content">
                <div id="appList" class="app-grid">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>

        <!-- 游戏容器 -->
        <div id="gameContainer" class="game-container">
            <header class="game-header">
                <button class="game-back" id="gameBack">←</button>
                <span class="game-title" id="gameTitle">游戏</span>
                <div style="width: 40px;"></div>
            </header>
            <div class="game-content" id="gameContent">
                <!-- 游戏内容 -->
            </div>
        </div>

        <!-- Toast提示 -->
        <div id="toast" class="toast"></div>
    </div>

    <!-- 游戏基类 -->
    <script src="js/games/game-base.js"></script>
    <!-- 游戏实现 -->
    <script src="js/games/game-2048.js"></script>
    <script src="js/games/game-guess.js"></script>
    <script src="js/games/game-minesweeper.js"></script>
    <!-- 核心模块 -->
    <script src="js/core/auth.js"></script>
    <script src="js/core/storage.js"></script>
    <script src="js/core/app.js"></script>
</body>
</html>
